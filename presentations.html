<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations &amp; Slideshows</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #F0D080; --gold-dark: #9A7230;
    --black: #1A1A1A; --white: #FFFFFF; --cream: #FDF8EC;
    --green: #2D5016; --green-mid: #4A7C2A; --green-light: #D4E8C2; --soft-green: #F0F7E8;
  }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--black); min-height: 100vh; }
  nav { background: linear-gradient(135deg, var(--black) 0%, #2a2a2a 50%, var(--green) 100%); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .nav-inner { display: flex; flex-wrap: wrap; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
  .nav-brand { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; padding: 1rem 1.5rem 1rem 0; white-space: nowrap; letter-spacing: 0.03em; text-shadow: 0 1px 4px rgba(0,0,0,0.5); border-right: 1px solid rgba(201,168,76,0.3); margin-right: 0.5rem; text-decoration: none; }
  nav a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 1.1rem 0.9rem; display: inline-block; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s, border-bottom 0.2s; border-bottom: 3px solid transparent; }
  nav a:hover, nav a.active { color: var(--gold-light); border-bottom: 3px solid var(--gold); }
  .inner-page { border: 4px solid var(--gold); margin: 1.5rem; border-radius: 10px; background: var(--white); box-shadow: 0 4px 20px rgba(201,168,76,0.12), inset 0 0 0 6px rgba(74,124,42,0.06); min-height: calc(100vh - 130px); }
  .inner-header { background: linear-gradient(135deg, var(--green) 0%, #3a6a1a 50%, var(--black) 100%); border-radius: 6px 6px 0 0; padding: 2rem 2.5rem; border-bottom: 3px solid var(--gold); display: flex; align-items: center; gap: 1rem; }
  .inner-header h1 { font-family: 'Playfair Display', serif; color: var(--gold-light); font-size: 2rem; font-weight: 700; }
  .inner-header .page-icon { font-size: 2rem; }
  .inner-body { padding: 2rem 2.5rem; }
  .upload-zone { border: 2px dashed var(--gold); border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; background: var(--soft-green); transition: background 0.2s; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .upload-zone:hover { background: var(--green-light); }
  .upload-zone input[type="file"] { display: none; }
  .upload-zone p { color: var(--green); font-weight: 600; font-size: 1rem; margin: 0; }
  .upload-zone span { color: var(--gold-dark); font-size: 0.85rem; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; margin-top: 0.75rem; }
  .photo-label-box { width: 100%; border: 1.5px solid var(--gold-light); border-radius: 6px; padding: 5px 8px; font-family: 'Lato', sans-serif; font-size: 0.85rem; background: var(--cream); color: var(--black); outline: none; margin-top: 4px; }
  .upload-status { margin-top: 0.6rem; font-size: 0.88rem; font-weight: 600; display: none; }
  .upload-status.show { display: flex; align-items: center; gap: 0.5rem; }
  .upload-progress-bar { height: 8px; border-radius: 99px; background: var(--green-light); overflow: hidden; margin-top: 0.3rem; display: none; }
  .upload-progress-bar.show { display: block; }
  .upload-progress-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--green-mid), var(--gold)); transition: width 0.3s ease; }
  .status-success { color: var(--green-mid); } .status-error { color: #c00; } .status-loading { color: var(--gold-dark); }
  .editor-only { display: none !important; }
  body.edit-mode .editor-only { display: flex !important; }
  @media (max-width: 600px) { .inner-page { margin: 0.5rem; } .inner-body { padding: 1rem; } nav a { padding: 0.8rem 0.5rem; font-size: 0.78rem; } }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">🌿 Our Way 2 Love</a>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="photos.html">Photos</a>
    <a href="gathering.html">Gatherings</a>
    <a href="honors.html">Honors</a>
    <a href="military.html">Military</a>
    <a href="presentations.html" class="active">Slideshows</a>
  </div>
</nav>
<div class="inner-page">
  <div class="inner-header"><span class="page-icon">📽️</span><h1>Presentations &amp; Slideshows</h1></div>
  <div class="inner-body">
    <div style="display:grid;grid-template-columns:1fr 1px 1fr;gap:0 1.5rem;margin-bottom:2rem;align-items:start;">
      <div>
        <label style="font-size:0.82rem;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:0.5rem;">📊 PowerPoint / Presentations</label>
        <div class="upload-zone editor-only" id="uz-ppt">
          <p>Click to upload PowerPoint or PDF</p><span>.ppt, .pptx, .pdf supported</span>
          <input id="upl-ppt" type="file" multiple accept=".ppt,.pptx,.pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" onchange="addPresentations(this)">
        </div>
        <div id="presentations-grid" style="display:flex;flex-direction:column;gap:0.75rem;margin-top:0.75rem;"></div>
      </div>
      <div style="background:rgba(26,26,26,0.18);width:1px;align-self:stretch;min-height:200px;margin-top:1.75rem;"></div>
      <div>
        <label style="font-size:0.82rem;font-weight:700;color:var(--gold-dark);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:0.5rem;">🎬 Videos</label>
        <div class="upload-zone editor-only" id="uz-pres-vid">
          <p>Click to upload Video</p><span>MP4, MOV, AVI, WebM supported</span>
          <input id="upl-pres-vid" type="file" multiple accept="video/*" onchange="addVideosToGrid(this,'pres-video-grid')">
        </div>
        <div class="photo-grid" id="pres-video-grid"></div>
      </div>
    </div>
  </div>
</div>
<script>
// ============================================================
// EDIT MODE — set to true to enable adding/removing content
// Set to false before publishing so the site is view-only
// ============================================================
const EDIT_MODE = false;

if (EDIT_MODE) document.body.classList.add('edit-mode');

document.addEventListener('DOMContentLoaded', function() {
  if (EDIT_MODE) {
    document.getElementById('uz-ppt').addEventListener('click', () => document.getElementById('upl-ppt').click());
    document.getElementById('uz-pres-vid').addEventListener('click', () => document.getElementById('upl-pres-vid').click());
  }
});

function getOrCreateStatus(zone) {
  let status = zone.querySelector('.upload-status');
  if (!status) {
    status = document.createElement('div'); status.className = 'upload-status';
    const bar = document.createElement('div'); bar.className = 'upload-progress-bar';
    const fill = document.createElement('div'); fill.className = 'upload-progress-fill';
    bar.appendChild(fill); zone.appendChild(status); zone.appendChild(bar);
  }
  return status;
}
function showUploadStatus(zone, type, message) {
  if (!zone) return;
  const s = getOrCreateStatus(zone); s.className = 'upload-status show status-' + type; s.textContent = message;
  const b = zone.querySelector('.upload-progress-bar'); if (b) b.className = 'upload-progress-bar show';
}
function updateProgressBar(zone, fraction) {
  if (!zone) return; getOrCreateStatus(zone);
  const f = zone.querySelector('.upload-progress-fill'); if (f) f.style.width = Math.round(fraction * 100) + '%';
}
function hideUploadStatus(zone) {
  if (!zone) return;
  const s = zone.querySelector('.upload-status'); const b = zone.querySelector('.upload-progress-bar');
  if (s) s.classList.remove('show');
  if (b) { b.classList.remove('show'); const f = b.querySelector('.upload-progress-fill'); if (f) f.style.width = '0%'; }
}
function addPresentations(input) {
  if (!EDIT_MODE) return;
  const grid = document.getElementById('presentations-grid'); if (!grid) return;
  const files = Array.from(input.files); if (!files.length) return;
  const zone = input.closest('.upload-zone') || input.parentElement;
  showUploadStatus(zone, 'loading', `⏳ Processing ${files.length} file${files.length > 1 ? 's' : ''}...`);
  files.forEach((file, i) => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;align-items:center;gap:0.75rem;background:var(--cream);border:1.5px solid var(--gold-light);border-radius:8px;padding:0.65rem 1rem;';
    const ext = file.name.split('.').pop().toLowerCase();
    const icon = ext === 'pdf' ? '📄' : '📊'; const sizeMB = (file.size/1024/1024).toFixed(2);
    wrapper.innerHTML = `<span style="font-size:1.5rem;">${icon}</span>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:0.95rem;color:var(--green);">${file.name}</div>
        <div style="font-size:0.78rem;color:#888;">${sizeMB} MB · .${ext.toUpperCase()}</div>
        <input type="text" placeholder="✏️ Add a label or description..." class="photo-label-box editor-only" style="margin-top:4px;width:100%;">
      </div>
      <button class="editor-only" onclick="this.closest('div[style]').remove()" style="background:none;border:none;color:#c00;font-size:1.1rem;cursor:pointer;font-weight:700;">✕</button>`;
    grid.appendChild(wrapper); updateProgressBar(zone, (i+1)/files.length);
  });
  showUploadStatus(zone, 'success', `✅ ${files.length} file${files.length > 1 ? 's' : ''} added!`); setTimeout(() => hideUploadStatus(zone), 3000);
  input.value = '';
}
function addVideosToGrid(input, gridId) {
  if (!EDIT_MODE) return;
  const grid = document.getElementById(gridId);
  const files = Array.from(input.files).filter(f => f.type.startsWith('video/'));
  if (!files.length) return;
  const zone = input.closest('.upload-zone') || input.parentElement;
  showUploadStatus(zone, 'loading', `⏳ Loading ${files.length} video${files.length > 1 ? 's' : ''}...`);
  files.forEach((file, i) => {
    const url = URL.createObjectURL(file);
    const wrapper = document.createElement('div'); wrapper.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    const v = document.createElement('video'); v.src = url; v.controls = true; v.muted = false; v.volume = 1.0; v.preload = 'metadata';
    v.style.cssText = 'width:100%;border-radius:8px;border:2px solid var(--gold-light);background:#000;max-height:200px;';
    const rb = document.createElement('button'); rb.innerHTML = '✕ Remove'; rb.className = 'editor-only';
    rb.style.cssText = 'background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:0.78rem;cursor:pointer;align-self:flex-end;'; rb.onclick = () => wrapper.remove();
    const cap = document.createElement('input'); cap.type = 'text'; cap.className = 'photo-label-box editor-only'; cap.placeholder = '✏️ Type a label or caption...';
    wrapper.appendChild(v); wrapper.appendChild(rb); wrapper.appendChild(cap); grid.appendChild(wrapper);
    updateProgressBar(zone, (i + 1) / files.length);
  });
  showUploadStatus(zone, 'success', `✅ ${files.length} video${files.length > 1 ? 's' : ''} added!`); setTimeout(() => hideUploadStatus(zone), 3000);
  input.value = '';
}
</script>
</body>
</html>
