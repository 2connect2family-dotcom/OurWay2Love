<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military Service</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #F0D080; --gold-dark: #9A7230;
    --black: #1A1A1A; --white: #FFFFFF; --cream: #FDF8EC;
    --green: #2D5016; --green-mid: #4A7C2A; --green-light: #D4E8C2; --soft-green: #F0F7E8;
  }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--black); min-height: 100vh; }
  nav { background: linear-gradient(135deg, var(--black) 0%, #2a2a2a 50%, var(--green) 100%); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .nav-inner { display: flex; flex-wrap: wrap; align-items: center; max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
  .nav-brand { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; padding: 1rem 1.5rem 1rem 0; white-space: nowrap; letter-spacing: 0.03em; text-shadow: 0 1px 4px rgba(0,0,0,0.5); border-right: 1px solid rgba(201,168,76,0.3); margin-right: 0.5rem; text-decoration: none; }
  nav a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 1.1rem 0.9rem; display: inline-block; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s, border-bottom 0.2s; border-bottom: 3px solid transparent; }
  nav a:hover, nav a.active { color: var(--gold-light); border-bottom: 3px solid var(--gold); }
  .inner-page { border: 4px solid var(--gold); margin: 1.5rem; border-radius: 10px; background: var(--white); box-shadow: 0 4px 20px rgba(201,168,76,0.12), inset 0 0 0 6px rgba(74,124,42,0.06); min-height: calc(100vh - 130px); }
  .inner-header { background: linear-gradient(135deg, var(--green) 0%, #3a6a1a 50%, var(--black) 100%); border-radius: 6px 6px 0 0; padding: 2rem 2.5rem; border-bottom: 3px solid var(--gold); display: flex; align-items: center; gap: 1rem; }
  .inner-header h1 { font-family: 'Playfair Display', serif; color: var(--gold-light); font-size: 2rem; font-weight: 700; }
  .inner-header .page-icon { font-size: 2rem; }
  .inner-body { padding: 2rem 2.5rem; }
  .entries-area { display: flex; flex-direction: column; gap: 1.5rem; }
  .add-entry-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--green); color: var(--white); border: none; border-radius: 8px; padding: 0.65rem 1.4rem; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif; transition: background 0.2s; margin-bottom: 1.25rem; }
  .add-entry-btn:hover { background: var(--green-mid); }
  .entry-card { background: var(--cream); border: 2px solid var(--gold-light); border-left: 5px solid var(--gold); border-radius: 8px; padding: 1.25rem 1.5rem; position: relative; }
  .entry-card textarea, .entry-card input[type="text"] { width: 100%; border: 1.5px solid var(--gold-light); border-radius: 6px; padding: 0.5rem 0.75rem; font-family: 'Lato', sans-serif; font-size: 1rem; background: var(--white); color: var(--black); resize: vertical; margin-top: 0.4rem; }
  .entry-card input[type="text"] { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .entry-card label { font-size: 0.8rem; font-weight: 700; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.05em; }
  .entry-photos { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
  .entry-photo-thumb { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; border: 2px solid var(--gold-light); }
  .entry-add-photo-btn { width: 80px; height: 80px; border-radius: 6px; border: 2px dashed var(--gold); background: var(--soft-green); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; color: var(--green); position: relative; }
  .entry-add-photo-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .entry-remove-btn { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #c00; font-weight: 700; padding: 0 0.3rem; }
  .upload-zone { border: 2px dashed var(--gold); border-radius: 10px; padding: 0.75rem; text-align: center; cursor: pointer; background: var(--soft-green); transition: background 0.2s; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .upload-zone:hover { background: var(--green-light); }
  .upload-zone p { color: var(--green); font-weight: 600; font-size: 0.9rem; margin: 0; }
  .upload-zone span { color: var(--gold-dark); font-size: 0.78rem; }
  .upload-status { margin-top: 0.6rem; font-size: 0.88rem; font-weight: 600; display: none; }
  .upload-status.show { display: flex; align-items: center; gap: 0.5rem; }
  .upload-progress-bar { height: 8px; border-radius: 99px; background: var(--green-light); overflow: hidden; margin-top: 0.3rem; display: none; }
  .upload-progress-bar.show { display: block; }
  .upload-progress-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--green-mid), var(--gold)); transition: width 0.3s ease; }
  .status-success { color: var(--green-mid); } .status-error { color: #c00; } .status-loading { color: var(--gold-dark); }
  .editor-only { display: none !important; }
  body.edit-mode .editor-only { display: inline-flex !important; }
  @media (max-width: 600px) { .inner-page { margin: 0.5rem; } .inner-body { padding: 1rem; } nav a { padding: 0.8rem 0.5rem; font-size: 0.78rem; } }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">🌿 Our Way 2 Love</a>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="photos.html">Photos</a>
    <a href="gathering.html">Gatherings</a>
    <a href="honors.html">Honors</a>
    <a href="military.html" class="active">Military</a>
    <a href="presentations.html">Slideshows</a>
  </div>
</nav>
<div class="inner-page">
  <div class="inner-header"><span class="page-icon">🎖️</span><h1>Military Service</h1></div>
  <div class="inner-body">
    <button class="add-entry-btn editor-only" onclick="addEntry('military-entries')">＋ Add Service Member</button>
    <div class="entries-area" id="military-entries"></div>
  </div>
</div>
<script>
// ============================================================
// EDIT MODE — set to true to enable adding/removing content
// Set to false before publishing so the site is view-only
// ============================================================
const EDIT_MODE = false;

if (EDIT_MODE) document.body.classList.add('edit-mode');

function addEntryPhotos(input) {
  if (!EDIT_MODE) return;
  const photosDiv = input.closest('.entry-photos');
  const addBtn = photosDiv.querySelector('.entry-add-photo-btn');
  Array.from(input.files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img'); img.src = e.target.result; img.className = 'entry-photo-thumb';
      img.title = 'Click to remove'; img.onclick = () => img.remove();
      photosDiv.insertBefore(img, addBtn);
    };
    reader.readAsDataURL(file);
  }); input.value = '';
}
function addEntryVideos(input) {
  if (!EDIT_MODE) return;
  const videoGrid = input.closest('.upload-zone').nextElementSibling;
  Array.from(input.files).forEach(file => {
    if (!file.type.startsWith('video/')) return;
    const url = URL.createObjectURL(file);
    const wrapper = document.createElement('div'); wrapper.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
    const v = document.createElement('video'); v.src = url; v.controls = true; v.muted = false; v.volume = 1.0; v.preload = 'metadata';
    v.style.cssText = 'width:100%;border-radius:8px;border:2px solid var(--gold-light);background:#000;max-height:180px;';
    const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:0.5rem;align-items:center;';
    const cap = document.createElement('input'); cap.type = 'text'; cap.placeholder = '✏️ Label this video...'; cap.style.flex = '1';
    const rb = document.createElement('button'); rb.textContent = '✕'; rb.style.cssText = 'background:#c00;color:#fff;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-weight:700;'; rb.onclick = () => wrapper.remove();
    row.appendChild(cap); row.appendChild(rb); wrapper.appendChild(v); wrapper.appendChild(row); videoGrid.appendChild(wrapper);
  }); input.value = '';
}
function addEntry(containerId) {
  if (!EDIT_MODE) return;
  const container = document.getElementById(containerId);
  const card = document.createElement('div'); card.className = 'entry-card';
  card.innerHTML = `
    <button class="entry-remove-btn editor-only" onclick="this.parentElement.remove()">✕</button>
    <div style="margin-bottom:0.5rem;"><label>Service Member Name</label>
    <input type="text" placeholder="e.g. Sgt. James T. Williams, U.S. Army"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.5rem;">
      <div><label>Branch</label><input type="text" placeholder="e.g. U.S. Marine Corps"></div>
      <div><label>Rank &amp; Years</label><input type="text" placeholder="e.g. Corporal · 1968–1972"></div>
    </div>
    <div style="margin-bottom:0.5rem;"><label>Service Story &amp; Honors</label>
    <textarea rows="4" placeholder="Describe their service, deployments, medals..."></textarea></div>
    <div><label>Photos</label>
    <div class="entry-photos" id="ep-${Date.now()}">
      <label class="entry-add-photo-btn editor-only">+<input type="file" accept="image/*" multiple onchange="addEntryPhotos(this)"></label>
    </div></div>
    <div style="margin-top:0.75rem;"><label>🎬 Videos</label>
    <div style="margin-top:0.4rem;">
      <div class="upload-zone editor-only" onclick="this.querySelector('input').click()">
        <p>Click to add videos</p><span>MP4, MOV, WebM supported</span>
        <input type="file" accept="video/*" multiple style="display:none;" onchange="addEntryVideos(this)">
      </div>
      <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.5rem;"></div>
    </div></div>`;
  container.appendChild(card);
}
</script>
</body>
</html>
